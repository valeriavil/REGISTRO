<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Usuario</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <h1>Bienvenido al Registro</h1>
    <p>Crea tu cuenta para comenzar</p>
  </header>

  <section class="container">
    <div class="card">
      <img src="img/perfil.jpg" alt="Imagen de perfil">
      <form id="registroForm">
        <label for="nombre">Nombre de usuario:</label>
        <input type="text" id="nombre" name="nombre" required>

        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" required>
        <small id="passwordMsg"></small>

        <label for="fecha">Fecha de nacimiento:</label>
        <input type="date" id="fecha" name="fecha" required>

        <label for="color">Color favorito:</label>
        <input type="color" id="color" name="color">

        <label for="pais">País:</label>
        <input list="paises" id="pais" name="pais" placeholder="Escribe o selecciona">
        <datalist id="paises">
          <option value="México">
          <option value="Argentina">
          <option value="España">
          <option value="Colombia">
          <option value="Chile">
        </datalist>

        <button type="submit">Registrarse</button>
      </form>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 Registro de Usuario</p>
  </footer>

  <script src="css/styles.css"></script>
</body>
</html>
